<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colonel AI — Battlefield</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 16px;
    color: #58a6ff;
    font-weight: 600;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3fb950;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .grid-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    min-width: 0;
  }
  canvas {
    border: 1px solid #30363d;
    cursor: crosshair;
  }
  .panel {
    width: 300px;
    background: #161b22;
    border-left: 1px solid #30363d;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  .panel h2 {
    font-size: 13px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .panel .field {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    border-bottom: 1px solid #21262d;
  }
  .field .label { color: #8b949e; }
  .field .value { color: #c9d1d9; font-weight: 600; }
  .value.friendly { color: #3b82f6; }
  .value.adversary { color: #ef4444; }
  .value.active { color: #3fb950; }
  .value.wounded { color: #d29922; }
  .value.destroyed { color: #f85149; }
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin: 8px 0;
  }
  .controls .row {
    display: flex;
    gap: 4px;
  }
  .controls button {
    width: 48px; height: 36px;
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .controls button:hover { background: #30363d; box-shadow: 0 0 6px rgba(88,166,255,0.3); }
  .controls button:active { background: #484f58; }
  .call-btn {
    width: 100%;
    padding: 10px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .call-btn:hover { background: #2ea043; box-shadow: 0 0 10px rgba(46,160,67,0.4); }
  .call-btn:disabled {
    background: #21262d;
    color: #484f58;
    cursor: not-allowed;
    box-shadow: none;
  }
  .hangup-btn {
    width: 100%;
    padding: 10px;
    background: #da3633;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .hangup-btn:hover { background: #f85149; box-shadow: 0 0 10px rgba(248,81,73,0.4); }
  .no-selection {
    color: #484f58;
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  /* --- Call panel --- */
  .call-panel {
    border-top: 1px solid #30363d;
    padding-top: 12px;
    margin-top: 4px;
  }
  .call-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .call-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .call-status-dot.idle { background: #484f58; }
  .call-status-dot.connecting { background: #d29922; animation: pulse 1s infinite; }
  .call-status-dot.connected { background: #3fb950; animation: pulse 2s infinite; }
  .call-status-dot.ended { background: #f85149; }
  .call-status-text { color: #8b949e; }
  .call-status-text.connected { color: #3fb950; }

  .transcript-box {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 8px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 11px;
    margin-top: 8px;
  }
  .transcript-entry {
    padding: 3px 0;
    border-bottom: 1px solid #161b22;
    line-height: 1.4;
  }
  .transcript-entry.bot { color: #58a6ff; }
  .transcript-entry.user { color: #3fb950; }
  .transcript-entry .speaker {
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
  }

  /* --- Event log --- */
  .event-log {
    background: #161b22;
    border-top: 1px solid #30363d;
    height: 160px;
    overflow-y: auto;
    padding: 8px 16px;
    font-size: 12px;
  }
  .event-log h2 {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .event-entry {
    padding: 2px 0;
    color: #8b949e;
    border-bottom: 1px solid #0d1117;
  }
  .event-entry .time { color: #484f58; }
  .event-entry.CONTACT { color: #f85149; }
  .event-entry.MOVE { color: #8b949e; }
  .event-entry.STATUS { color: #d29922; }
  .event-entry.REPORT { color: #58a6ff; }
  .event-entry.DISPATCH { color: #a371f7; }
  .legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #8b949e;
    padding: 4px 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .legend-sq {
    width: 10px; height: 10px;
    border-radius: 2px;
  }
  .dispatch-btn {
    width: 100%;
    padding: 10px;
    background: #1f6feb;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .dispatch-btn:hover { background: #388bfd; box-shadow: 0 0 10px rgba(56,139,253,0.4); }
  .dispatch-btn.active {
    background: #58a6ff;
    animation: pulse 1s infinite;
  }
  .cancel-dispatch-btn {
    width: 100%;
    padding: 8px;
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .cancel-dispatch-btn:hover { background: #30363d; color: #c9d1d9; }
  .dispatch-hint {
    color: #58a6ff;
    font-size: 11px;
    text-align: center;
    padding: 6px 0;
    animation: pulse 1s infinite;
  }

  /* --- Transcript history section --- */
  .transcript-history {
    border-top: 1px solid #30363d;
    padding-top: 12px;
    margin-top: 4px;
  }
  .transcript-history h2 {
    font-size: 13px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .transcript-empty {
    color: #484f58;
    font-size: 12px;
    font-style: italic;
  }
</style>
</head>
<body>
<header>
  <div class="status-dot"></div>
  <h1>COLONEL AI - BATTLEFIELD OPERATIONS CENTER</h1>
</header>
<div class="main">
  <div class="grid-container">
    <canvas id="grid"></canvas>
  </div>
  <div class="panel" id="panel">
    <h2>Unit Info</h2>
    <div id="info-content">
      <div class="no-selection">Click a unit on the grid to select</div>
    </div>
    <div id="call-section"></div>
    <div id="transcript-history"></div>
  </div>
</div>
<div class="event-log" id="event-log">
  <h2>Event Log</h2>
  <div id="events"></div>
</div>

<audio id="remoteAudio" autoplay></audio>

  const d = imgd.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] > 10) {
      d[i]   = Math.min(255, d[i]*0.25 + tr*0.75) | 0;
      d[i+1] = Math.min(255, d[i+1]*0.25 + tg*0.75) | 0;
      d[i+2] = Math.min(255, d[i+2]*0.25 + tb*0.75) | 0;
    }
  }
  tx2.putImageData(imgd, 0, 0);
  tintCache[key] = tc;
  return tc;
}

// =====================================================
// GRID SETUP — 30w x 15h, dynamically sized to fill vertical space
// =====================================================
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
const GRID_W = 30;
const GRID_H = 15;
let CELL = 30;  // recalculated by resizeCanvas()

function resizeCanvas() {
  const container = document.querySelector('.grid-container');
  const availH = container.clientHeight - 16;
  const availW = container.clientWidth - 16;
  // Size cells to fill vertical space, then check horizontal fit
  let cell = Math.floor(availH / GRID_H);
  if (cell * GRID_W > availW) {
    cell = Math.floor(availW / GRID_W);
  }
  CELL = Math.max(cell, 12);
  canvas.width = CELL * GRID_W;
  canvas.height = CELL * GRID_H;
  if (battleState) render();
}
window.addEventListener('resize', resizeCanvas);
requestAnimationFrame(resizeCanvas);

let BOT_URL = 'http://localhost:7860';
// Fetch bot URL from server config (supports cloud deployment)
fetch('/api/config').then(r => r.json()).then(cfg => {
  if (cfg.bot_url) BOT_URL = cfg.bot_url;
}).catch(() => {});

let battleState = null;
let selectedId = null;
let ws = null;
let dispatchMode = false;
let hoverCell = null;

// --- WebRTC call state ---
let pc = null;
let localStream = null;
let callState = 'idle';
let callSoldierId = null;

// --- WebSocket for battlefield state ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (e) => {
    battleState = JSON.parse(e.data);
    render();
    renderEvents();
    if (selectedId) {
      renderPanel();
      renderTranscriptHistory();
    }
    if (callState === 'connected' && callSoldierId) {
      renderLiveTranscript();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 1000);
  ws.onerror = () => ws.close();
}
connectWS();

// =====================================================
// CANVAS RENDERING — rich visuals from root + backend data
// =====================================================
function render() {
  if (!battleState) return;

  // --- Background: terrain image or dark fill ---
  if (terrainImg.complete && terrainImg.naturalWidth) {
    ctx.drawImage(terrainImg, 0, 0, canvas.width, canvas.height);
    // Darken overlay for readability
    ctx.fillStyle = 'rgba(13, 17, 23, 0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // --- Grid lines ---
  ctx.strokeStyle = 'rgba(26, 58, 26, 0.6)';
  ctx.lineWidth = 0.3;
  for (let i = 0; i <= GRID_W; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let i = 0; i <= GRID_H; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(canvas.width, i * CELL);
    ctx.stroke();
  }

  // --- Grid coordinate labels (every 5th cell) ---
  ctx.fillStyle = 'rgba(26, 58, 26, 0.8)';
  ctx.font = `${Math.max(8, CELL * 0.28)|0}px Courier New`;
  ctx.textAlign = 'center';
  for (let i = 0; i < GRID_W; i += 5) {
    ctx.fillText(i, i * CELL + CELL/2, 9);
  }
  for (let i = 0; i < GRID_H; i += 5) {
    ctx.fillText(i, 8, i * CELL + CELL/2 + 3);
  }

  // --- Safe zones ---
  const SAFE_ZONE_RADIUS = 2;
  const safeZones = [
    { x: 3, y: 12, color: 'rgba(59, 130, 246, 0.08)', border: 'rgba(59, 130, 246, 0.25)', label: 'FRIENDLY SAFE ZONE' },
    { x: 26, y: 2, color: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.25)', label: 'ADVERSARY SAFE ZONE' },
  ];
  for (const zone of safeZones) {
    const x0 = (zone.x - SAFE_ZONE_RADIUS) * CELL;
    const y0 = (zone.y - SAFE_ZONE_RADIUS) * CELL;
    const side = (SAFE_ZONE_RADIUS * 2 + 1) * CELL;
    ctx.fillStyle = zone.color;
    ctx.fillRect(x0, y0, side, side);
    ctx.strokeStyle = zone.border;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(x0, y0, side, side);
    ctx.setLineDash([]);
    ctx.fillStyle = zone.border;
    ctx.font = `${Math.max(7, CELL * 0.22)|0}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(zone.label, x0 + side / 2, y0 + 8);
  }

  // --- Dispatch paths (draw before units so lines appear behind) ---
  const items = battleState.items;
  for (const id in items) {
    const item = items[id];
    if (!item.destination) continue;
    const cx = item.position[0] * CELL + CELL / 2;
    const cy = item.position[1] * CELL + CELL / 2;
    const dx = item.destination[0] * CELL + CELL / 2;
    const dy = item.destination[1] * CELL + CELL / 2;
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(dx, dy);
    ctx.stroke();
    ctx.setLineDash([]);
    // Destination marker — small diamond
    ctx.fillStyle = '#58a6ff';
    ctx.beginPath();
    ctx.moveTo(dx, dy - 3);
    ctx.lineTo(dx + 3, dy);
    ctx.lineTo(dx, dy + 3);
    ctx.lineTo(dx - 3, dy);
    ctx.closePath();
    ctx.fill();
  }

  // --- Units ---
  for (const id in items) {
    const item = items[id];
    const cx = item.position[0] * CELL + CELL / 2;
    const cy = item.position[1] * CELL + CELL / 2;
    const factionColor = item.faction === 'friendly' ? '#3b82f6' : '#ef4444';
    const tintStr = item.faction === 'friendly' ? 'blue' : 'red';
    const isDestroyed = item.status === 'destroyed';
    const role = item.role;

    const isVehicle = ['tank', 'car'].includes(role);
    const isMedical = role === 'medical_car' || role === 'doctor';
    const isSoldierType = ['soldier', 'commander', 'scout'].includes(role);

    // --- Selection ring ---
    if (id === selectedId) {
      ctx.strokeStyle = '#facc15';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.45, 0, Math.PI * 2);
      ctx.stroke();
    }

    // --- Draw unit by role ---
    if (isDestroyed) {
      // Destroyed: faded ghost silhouette with decay effect
      ctx.globalAlpha = 0.25;
      const ghostColor = item.faction === 'friendly' ? '#4a6a8a' : '#8a4a4a';

      if (isSoldierType) {
        // Faded soldier shape
        const r = CELL * 0.3;
        ctx.fillStyle = '#2a2e33';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = ghostColor;
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (role === 'tank') {
        const s = CELL * 0.32;
        ctx.fillStyle = '#2a2e33';
        ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
        ctx.strokeStyle = ghostColor;
        ctx.lineWidth = 1;
        ctx.strokeRect(cx - s, cy - s, s * 2, s * 2);
      } else if (role === 'medical_car' || role === 'doctor') {
        const r = role === 'medical_car' ? CELL * 0.32 : CELL * 0.25;
        ctx.fillStyle = '#2a2e33';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#3a3e43';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else {
        ctx.fillStyle = '#2a2e33';
        ctx.beginPath();
        ctx.arc(cx, cy, CELL * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;

      // Diagonal slash through the wreck
      ctx.strokeStyle = 'rgba(248, 81, 73, 0.4)';
      ctx.lineWidth = 1.5;
      const s = CELL * 0.22;
      ctx.beginPath();
      ctx.moveTo(cx - s, cy - s); ctx.lineTo(cx + s, cy + s);
      ctx.moveTo(cx + s, cy - s); ctx.lineTo(cx - s, cy + s);
      ctx.stroke();

      // "KIA" label
      ctx.fillStyle = 'rgba(248, 81, 73, 0.5)';
      ctx.font = `bold ${Math.max(8, CELL * 0.22)|0}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('KIA', cx, cy + CELL * 0.47);

    } else if (isSoldierType) {
      // --- Soldier / Commander / Scout ---
      const r = role === 'scout' ? CELL * 0.28 : CELL * 0.32;
      const spriteSize = CELL * 0.8;
      const tinted = getTinted(soldierImg, item.faction, tintStr + '_soldier', tintStr);

      // Outer glow ring for visibility
      ctx.strokeStyle = factionColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
      ctx.stroke();

      if (tinted) {
        ctx.drawImage(tinted, cx - spriteSize/2, cy - spriteSize/2, spriteSize, spriteSize);
      } else {
        // Fallback: filled circle with inner highlight
        ctx.fillStyle = factionColor;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        // Inner highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Role badge
      if (role === 'commander') {
        // Gold star
        ctx.fillStyle = '#facc15';
        ctx.font = `bold ${Math.max(10, CELL * 0.3)|0}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText('\u2605', cx, cy - r - 3);
      } else if (role === 'scout') {
        // Binocular icon
        ctx.fillStyle = '#a5d6ff';
        ctx.font = `bold ${Math.max(7, CELL * 0.2)|0}px Courier New`;
        ctx.textAlign = 'center';
        ctx.fillText('SCT', cx, cy - r - 3);
      }

    } else if (role === 'tank') {
      // Tank: filled square with thick border + turret line
      const s = CELL * 0.35;
      ctx.fillStyle = factionColor;
      ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
      ctx.strokeStyle = item.faction === 'friendly' ? '#1d4ed8' : '#b91c1c';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(cx - s, cy - s, s * 2, s * 2);
      // Turret direction indicator
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      let tx = cx, ty = cy;
      const tl = s + 4;
      if (item.heading === 'N') ty -= tl;
      else if (item.heading === 'S') ty += tl;
      else if (item.heading === 'E') tx += tl;
      else if (item.heading === 'W') tx -= tl;
      else ty -= tl;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty); ctx.stroke();

    } else if (role === 'car') {
      // Transport car
      const s = CELL * 0.28;
      ctx.fillStyle = factionColor;
      ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - s, cy - s, s * 2, s * 2);

    } else if (role === 'medical_car') {
      // Medical car: white/green box with red cross + beacon
      const s = CELL * 0.35;
      ctx.fillStyle = '#e8f5e9';
      ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
      ctx.strokeStyle = '#2e7d32';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - s, cy - s, s * 2, s * 2);
      // Red cross
      ctx.fillStyle = '#c62828';
      const cw = Math.max(2, CELL * 0.06), ch = s * 0.7;
      ctx.fillRect(cx - cw, cy - ch, cw * 2, ch * 2);
      ctx.fillRect(cx - ch, cy - cw, ch * 2, cw * 2);
      // Beacon
      ctx.fillStyle = `rgba(255, 0, 0, ${0.5 + 0.5 * Math.sin(Date.now() / 300)})`;
      ctx.beginPath();
      ctx.arc(cx, cy - s - 3, 3, 0, Math.PI * 2);
      ctx.fill();

    } else if (role === 'doctor') {
      // Doctor: circle with cross
      const r = CELL * 0.26;
      ctx.fillStyle = '#e8f5e9';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2e7d32';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#c62828';
      const cw = Math.max(1.5, CELL * 0.05), ch = r * 0.6;
      ctx.fillRect(cx - cw, cy - ch, cw * 2, ch * 2);
      ctx.fillRect(cx - ch, cy - cw, ch * 2, cw * 2);

    } else {
      // Fallback: circle
      ctx.fillStyle = factionColor;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.28, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- Heading indicator (skip destroyed & tanks which have turret) ---
    if (!isDestroyed && role !== 'tank' && item.heading !== 'stationary') {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      let hx = cx, hy = cy;
      const hlen = CELL * 0.38;
      if (item.heading === 'N') hy -= hlen;
      else if (item.heading === 'S') hy += hlen;
      else if (item.heading === 'E') hx += hlen;
      else if (item.heading === 'W') hx -= hlen;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(hx, hy);
      ctx.stroke();
      // Arrowhead
      const angle = Math.atan2(hy - cy, hx - cx);
      const al = Math.min(5, CELL * 0.15);
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx - al * Math.cos(angle - 0.5), hy - al * Math.sin(angle - 0.5));
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx - al * Math.cos(angle + 0.5), hy - al * Math.sin(angle + 0.5));
      ctx.stroke();
    }

    // --- HP bar (skip destroyed) ---
    if (!isDestroyed) {
      const hp = item.health ?? 100;
      const barW = CELL * 0.7;
      const barH = 3;
      const barX = cx - barW / 2;
      const barY = cy - CELL * 0.45;
      ctx.fillStyle = 'rgba(48, 54, 61, 0.8)';
      ctx.fillRect(barX, barY, barW, barH);
      const pct = hp / 100;
      ctx.fillStyle = pct > 0.5 ? '#3fb950' : pct > 0.25 ? '#d29922' : '#f85149';
      ctx.fillRect(barX, barY, barW * pct, barH);
      ctx.strokeStyle = 'rgba(72, 79, 88, 0.5)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(barX, barY, barW, barH);
    }

    // --- Callsign label (skip destroyed — already has KIA) ---
    if (!isDestroyed) {
      ctx.fillStyle = '#c9d1d9';
      ctx.font = `${Math.max(8, CELL * 0.26)|0}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(item.callsign, cx, cy + CELL * 0.5 + Math.max(8, CELL * 0.22));
    }

    // --- CTRL badge ---
    if (item.controlled) {
      ctx.fillStyle = '#facc15';
      ctx.font = `bold ${Math.max(7, CELL * 0.2)|0}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('CTRL', cx, cy - CELL * 0.47 - 2);
    }

    // --- Active call indicator ---
    if (callState === 'connected' && id === callSoldierId) {
      ctx.strokeStyle = '#3fb950';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * 0.48, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // --- Dispatch preview: highlight hovered cell ---
  if (dispatchMode && hoverCell) {
    const hx = hoverCell[0] * CELL;
    const hy = hoverCell[1] * CELL;
    ctx.fillStyle = 'rgba(88, 166, 255, 0.15)';
    ctx.fillRect(hx, hy, CELL, CELL);
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(hx + 0.5, hy + 0.5, CELL - 1, CELL - 1);
    // Crosshair
    ctx.beginPath();
    ctx.moveTo(hx + CELL/2, hy + 2);
    ctx.lineTo(hx + CELL/2, hy + CELL - 2);
    ctx.moveTo(hx + 2, hy + CELL/2);
    ctx.lineTo(hx + CELL - 2, hy + CELL/2);
    ctx.stroke();
  }
}

// Re-render periodically so animated elements (medic beacon) stay alive
setInterval(() => { if (battleState) render(); }, 500);

// =====================================================
// CLICK TO SELECT
// =====================================================
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const gx = Math.floor(mx / CELL);
  const gy = Math.floor(my / CELL);

  if (!battleState) return;

  // Dispatch mode: click sets the destination
  if (dispatchMode && selectedId) {
    dispatchMode = false;
    canvas.style.cursor = 'crosshair';
    dispatchToCell(selectedId, gx, gy);
    render();
    renderPanel();
    return;
  }

  let found = null;
  for (const id in battleState.items) {
    const item = battleState.items[id];
    if (item.position[0] === gx && item.position[1] === gy) {
      found = id;
      break;
    }
  }
  selectedId = found;
  render();
  renderPanel();
  renderCallSection();
  renderTranscriptHistory();
});

canvas.addEventListener('mousemove', (e) => {
  if (!dispatchMode) { hoverCell = null; return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  hoverCell = [Math.floor(mx / CELL), Math.floor(my / CELL)];
  render();
});

canvas.addEventListener('mouseleave', () => {
  hoverCell = null;
  if (dispatchMode) render();
});

// CALL SECTION

function renderCallSection() {
  const section = document.getElementById('call-section');

  if (callState === 'connecting' || callState === 'connected') {
    const callerName = callSoldierId && battleState?.items[callSoldierId]
      ? battleState.items[callSoldierId].callsign : callSoldierId;

    section.innerHTML = `
      <div class="call-panel">
        <h2>Radio Call</h2>
        <div class="call-status">
          <div class="call-status-dot ${callState}"></div>
          <span class="call-status-text ${callState}">
            ${callState === 'connecting' ? 'Connecting...' : `On air as ${callerName}`}
          </span>
        </div>
        <button class="hangup-btn" onclick="hangUp()">End Call</button>
        <div class="transcript-box" id="transcript"></div>
      </div>
    `;
    return;
  }

  if (selectedId && battleState?.items[selectedId]?.faction === 'friendly') {
    const item = battleState.items[selectedId];
    section.innerHTML = `
      <div class="call-panel">
        <h2>Radio Call</h2>
        <button class="call-btn" onclick="startCall('${item.id}')">
          &#128222; Call as ${item.callsign}
        </button>
        ${callState === 'ended' ? `
          <div class="call-status" style="margin-top:8px">
            <div class="call-status-dot ended"></div>
            <span class="call-status-text">Call ended</span>
          </div>
        ` : ''}
      </div>
    `;
  } else if (callState === 'ended') {
    section.innerHTML = `
      <div class="call-panel">
        <h2>Radio Call</h2>
        <div class="call-status">
          <div class="call-status-dot ended"></div>
          <span class="call-status-text">Call ended</span>
        </div>
      </div>
    `;
  } else {
    section.innerHTML = '';
  }
}

// =====================================================
// WEBRTC CALL (Pipecat SmallWebRTC signaling)
// =====================================================
let pcId = null;
let dataChannel = null;
let sessionId = null;

async function startCall(soldierId) {
  if (callState === 'connecting' || callState === 'connected') return;

  callSoldierId = soldierId;
  callState = 'connecting';
  pcId = null;
  sessionId = null;
  renderCallSection();

  try {
    const startResp = await fetch(`${BOT_URL}/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        transport: 'webrtc',
        enableDefaultIceServers: true,
        body: { soldier_id: soldierId },
      }),
    });
    if (!startResp.ok) throw new Error(`/start returned ${startResp.status}`);
    const startData = await startResp.json();
    sessionId = startData.sessionId;

    localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });

    const iceServers = startData.iceConfig?.iceServers || [{ urls: 'stun:stun.l.google.com:19302' }];
    pc = new RTCPeerConnection({ iceServers });

    dataChannel = pc.createDataChannel('pipecat');
    dataChannel.onopen = () => console.log('Data channel open');
    dataChannel.onmessage = (event) => {
      try { const msg = JSON.parse(event.data); console.log('Bot message:', msg); } catch(e) {}
    };

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (event) => {
      document.getElementById('remoteAudio').srcObject = event.streams[0];
    };

    pc.onconnectionstatechange = () => {
      if (!pc) return;
      if (pc.connectionState === 'connected') {
        callState = 'connected';
        renderCallSection();
        render();
      } else if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
        cleanUpCall();
        renderCallSection();
        render();
      }
    };

    const iceCandidates = [];
    let answerReceived = false;

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        if (answerReceived && pcId) {
          sendIceCandidates([{
            candidate: event.candidate.candidate,
            sdpMid: event.candidate.sdpMid,
            sdpMlineIndex: event.candidate.sdpMLineIndex,
          }]);
        } else {
          iceCandidates.push({
            candidate: event.candidate.candidate,
            sdpMid: event.candidate.sdpMid,
            sdpMlineIndex: event.candidate.sdpMLineIndex,
          });
        }
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const resp = await fetch(`${BOT_URL}/sessions/${sessionId}/api/offer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type,
      }),
    });

    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`/api/offer returned ${resp.status}: ${text}`);
    }

    const answer = await resp.json();
    pcId = answer.pc_id;
    await pc.setRemoteDescription(new RTCSessionDescription({
      sdp: answer.sdp,
      type: answer.type,
    }));

    answerReceived = true;
    if (iceCandidates.length > 0) {
      sendIceCandidates(iceCandidates);
    }

  } catch (err) {
    console.error('Call failed:', err);
    cleanUpCall();
    callState = 'ended';
    renderCallSection();
  }
}

function sendIceCandidates(candidates) {
  if (!pcId) return;
  fetch(`${BOT_URL}/api/offer`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pc_id: pcId, candidates }),
  }).catch(err => console.warn('ICE candidate send failed:', err));
}

function hangUp() {
  cleanUpCall();
  renderCallSection();
  renderTranscriptHistory();
  render();
}

function cleanUpCall() {
  if (dataChannel) { dataChannel.close(); dataChannel = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  pcId = null;
  sessionId = null;
  document.getElementById('remoteAudio').srcObject = null;
  callState = 'ended';
  callSoldierId = null;
}

// =====================================================
// EVENT LOG
// =====================================================
function renderEvents() {
  if (!battleState) return;
  const container = document.getElementById('events');
  const events = battleState.events || [];
  const reversed = [...events].reverse();
  container.innerHTML = reversed.map(ev => {
    const d = new Date(ev.timestamp * 1000);
    const time = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    return `<div class="event-entry ${ev.event_type}"><span class="time">${time}</span> ${ev.description}</div>`;
  }).join('');
}

// =====================================================
// TRANSCRIPT RENDERING
// =====================================================
function formatTranscriptEntries(entries) {
  return entries.map(entry => {
    const d = new Date(entry.timestamp * 1000);
    const time = d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const cls = entry.speaker === 'bot' ? 'bot' : 'user';
    const label = entry.speaker === 'bot' ? 'COLONEL' : 'SOLDIER';
    return `<div class="transcript-entry ${cls}"><span class="speaker">${label}</span> <span class="time">${time}</span><br>${entry.text}</div>`;
  }).join('');
}

function renderLiveTranscript() {
  const box = document.getElementById('transcript');
  if (!box || !battleState?.transcripts || !callSoldierId) return;
  const entries = battleState.transcripts[callSoldierId] || [];
  box.innerHTML = formatTranscriptEntries(entries);
  box.scrollTop = box.scrollHeight;
}

function renderTranscriptHistory() {
  const container = document.getElementById('transcript-history');
  if (!container) return;

  if (!selectedId || !battleState?.transcripts) {
    container.innerHTML = '';
    return;
  }

  const entries = battleState.transcripts[selectedId] || [];

  if (callState === 'connected' && callSoldierId === selectedId) {
    container.innerHTML = '';
    return;
  }

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="transcript-history">
        <h2>Call History</h2>
        <div class="transcript-empty">No call transcripts for this unit</div>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="transcript-history">
      <h2>Call History (${entries.length} messages)</h2>
      <div class="transcript-box">${formatTranscriptEntries(entries)}</div>
    </div>
  `;

  const box = container.querySelector('.transcript-box');
  if (box) box.scrollTop = box.scrollHeight;
}
