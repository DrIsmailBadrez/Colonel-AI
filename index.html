<style>
#ws{position:fixed;top:0;left:0;width:100vw;height:100vh;overflow:hidden;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#hud{position:absolute;top:8px;left:8px;z-index:10;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hp{background:rgba(0,0,0,0.7);color:#fff;padding:3px 10px;border-radius:4px;font:12px monospace;border-left:3px solid #555;}
.bp{border-color:#4a9eff;}.rp{border-color:#ff4a4a;}
#sel{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.82);color:#fff;padding:8px 12px;border-radius:4px;font:12px monospace;display:none;z-index:10;min-width:160px;line-height:1.7;}
#ctrls{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;z-index:10;}
.cb{background:rgba(0,0,0,0.7);color:#fff;border:0.5px solid rgba(255,255,255,0.35);padding:4px 10px;border-radius:4px;font:12px monospace;cursor:pointer;}
.cb:hover{background:rgba(255,255,255,0.15);}
#colonelBtn{
  border-color:#c8a200;
  background:linear-gradient(135deg,rgba(20,10,40,0.95),rgba(40,20,80,0.95));
  font-weight:bold; letter-spacing:1px; padding:5px 14px;
  box-shadow:0 0 10px rgba(200,162,0,0.4);
  display:flex;align-items:center;gap:7px;
}
#colonelBtn:hover{background:linear-gradient(135deg,rgba(40,20,70,0.99),rgba(60,30,100,0.99));}
#colonelBtn img{width:22px;height:22px;border-radius:50%;border:1.5px solid #c8a200;object-fit:cover;}
#colonel-panel{
  position:fixed;bottom:60px;right:12px;width:340px;
  background:rgba(8,8,18,0.97);border:1px solid #c8a200;
  border-radius:8px;z-index:100;display:none;flex-direction:column;
  font-family:monospace;overflow:hidden;
  box-shadow:0 0 24px rgba(200,162,0,0.25);
}
#colonel-header{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:linear-gradient(90deg,rgba(20,10,50,1),rgba(40,20,80,1));
  border-bottom:1px solid #c8a200;
}
#colonel-header img{width:44px;height:44px;border-radius:50%;border:2px solid #c8a200;object-fit:cover;object-position:top;}
#colonel-title{flex:1;}
#colonel-title b{color:#c8a200;font-size:13px;display:block;}
#colonel-title span{color:#aaa;font-size:10px;}
#colonel-close{color:#c8a200;cursor:pointer;font-size:16px;padding:0 4px;}
#colonel-state{
  padding:10px 14px;max-height:260px;overflow-y:auto;
  font-size:10px;line-height:1.6;color:#ccc;
  border-bottom:1px solid rgba(200,162,0,0.2);
}
#colonel-state pre{margin:0;white-space:pre-wrap;word-break:break-all;}
#colonel-actions{padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;}
.col-act{background:rgba(200,162,0,0.15);border:1px solid rgba(200,162,0,0.4);
  color:#c8a200;border-radius:4px;padding:3px 10px;font:11px monospace;cursor:pointer;}
.col-act:hover{background:rgba(200,162,0,0.3);}
.col-act:disabled{opacity:0.35;cursor:not-allowed;}
#colonel-footer{padding:6px 14px 10px;font-size:9px;color:#666;text-align:center;}
.cb:disabled{opacity:0.4;cursor:not-allowed;}
#airBtn{min-width:110px;}
#reinforceBtn{min-width:130px;}
#air-alert{position:absolute;top:40px;left:50%;transform:translateX(-50%);color:#fff;padding:5px 20px;border-radius:4px;font:bold 13px monospace;z-index:20;display:none;letter-spacing:2px;white-space:nowrap;}
</style>

const canvas=document.getElementById('wc');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('ws');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
const W=()=>canvas.width, H=()=>canvas.height;

let paused=false,tick=0,selected=null,nid=0,totalSorties=0;
let reinforcementTicks=0;
const REINFORCE_DURATION=400;
// Two persistent medics — always on map, idle on sidelines until called
const MEDIC_COOLDOWN=300;
let medicCooldown=0;
function makeMedic(idx){
  // Idle positions: two spots near blue base edge
  const idleX = 0.06*800 + idx*60;
  const idleY = 0.22*600 + idx*40;
  return {x:idleX, y:idleY, angle:0, trail:[], healing:false,
          state:'idle', // 'idle','driving','healing','returning'
          target:null, idx};
}
let medics=[]; // populated after canvas sized
const keys={};
let controlled=null; // currently arrow-key controlled soldier
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  // Deselect control on Escape
  if(e.key==='Escape'){controlled=null;selected=null;document.getElementById('sel').style.display='none';}
  // Prevent page scrolling with arrow keys
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });
let soldiers=[],bullets=[],fxArr=[],planes=[],bombs=[],craters=[];

// Military bases — blue: top-left, red: bottom-right
// Defined as fractions, resolved to px at draw/update time
const BASES={
  blue:{ fx:0.09, fy:0.10, label:'BLUE BASE', col:'#4a9eff', dark:'#1a3a6a' },
  red: { fx:0.93, fy:0.88, label:'RED BASE',  col:'#ff4a4a', dark:'#6a1a1a' },
};
const BASE_RADIUS=55; // px, heal radius
const HEAL_RATE=0.18; // hp/tick when inside base


// ════════════════════════════════════════════════════════════
// GRID + WORLD STATE — AI Agent Interface
// ════════════════════════════════════════════════════════════
const GRID_COLS = 20;
const GRID_ROWS = 12;

// Convert px to grid cell
function toGrid(px, py){
  return {
    col: Math.max(0, Math.min(GRID_COLS-1, Math.floor(px / W() * GRID_COLS))),
    row: Math.max(0, Math.min(GRID_ROWS-1, Math.floor(py / H() * GRID_ROWS)))
  };
}
// Convert grid cell to px center
function fromGrid(col, row){
  return {
    x: (col + 0.5) / GRID_COLS * W(),
    y: (row + 0.5) / GRID_ROWS * H()
  };
}
// Grid label e.g. "C4" (col C = index 2, row 4)
function gridLabel(col, row){
  return String.fromCharCode(65 + col) + (row + 1);
}

// ── Static entity IDs (assigned once) ──
const ENTITY_IDS = {
  'base_blue': 'BASE_BLUE',
  'base_red':  'BASE_RED',
  'medic_0':   'MEDIC_0',
  'medic_1':   'MEDIC_1',
  'medic_2':   'MEDIC_2',
};

// ── Master world state snapshot — call this to get full context for AI ──
function getWorldState(){
  const snap = {
    tick,
    gridCols: GRID_COLS,
    gridRows: GRID_ROWS,
    // Bases
    bases: Object.entries(BASES).map(([faction, b])=>({
      id: ENTITY_IDS['base_'+faction],
      faction,
      x: Math.round(b.fx * W()),
      y: Math.round(b.fy * H()),
      grid: toGrid(b.fx*W(), b.fy*H()),
      gridLabel: gridLabel(toGrid(b.fx*W(), b.fy*H()).col, toGrid(b.fx*W(), b.fy*H()).row),
      healRadius: BASE_RADIUS,
    })),
    // Medics
    medics: medics.map((m, i)=>({
      id: ENTITY_IDS['medic_'+i],
      index: i,
      x: Math.round(m.x),
      y: Math.round(m.y),
      grid: toGrid(m.x, m.y),
      gridLabel: gridLabel(toGrid(m.x,m.y).col, toGrid(m.x,m.y).row),
      state: m.state,
      healing: m.healing,
      targetId: m.target ? 'S'+m.target.id : null,
    })),
    // Soldiers
    soldiers: soldiers.map(s=>({
      id: 'S'+s.id,
      faction: s.faction,
      x: Math.round(s.x),
      y: Math.round(s.y),
      grid: toGrid(s.x, s.y),
      gridLabel: gridLabel(toGrid(s.x,s.y).col, toGrid(s.x,s.y).row),
      hp: Math.round(s.hp),
      maxHp: s.mhp,
      hpPct: Math.round(s.hp/s.mhp*100),
      state: s.state,
      front: s.fi !== undefined ? FRONTS[s.fi].name : 'unknown',
      isSelected: s === selected,
      isControlled: s === controlled,
      angle: Math.round(s.angle * 180 / Math.PI),
    })),
    // Planes in the air
    planes: planes.map((p,i)=>({
      id: 'PLN_'+i,
      faction: p.faction,
      type: p.ptype,
      x: Math.round(p.x),
      y: Math.round(p.y),
      grid: toGrid(p.x, p.y),
      gridLabel: gridLabel(toGrid(p.x,p.y).col, toGrid(p.x,p.y).row),
      targetX: Math.round(p.tx),
      targetY: Math.round(p.ty),
      dropped: p.dropped,
    })),
    // Active bombs
    bombs: bombs.map((b,i)=>({
      id: 'BMB_'+i,
      faction: b.faction,
      x: Math.round(b.x),
      y: Math.round(b.y),
      grid: toGrid(b.x, b.y),
      gridLabel: gridLabel(toGrid(b.x,b.y).col, toGrid(b.x,b.y).row),
      targetX: Math.round(b.tx),
      targetY: Math.round(b.ty),
      blastRadius: b.blastRadius,
    })),
    // Selected / controlled soldier shortcut
    selected: selected ? 'S'+selected.id : null,
    controlled: controlled ? 'S'+controlled.id : null,
    // Cooldown states (for AI to know what actions are available)
    actions: {
      airstrike:   { available: airCooldown===0,   cooldownTicks: airCooldown },
      reinforce:   { available: reinforceCooldown===0, cooldownTicks: reinforceCooldown },
      medic:       { available: medicCooldown===0,  cooldownTicks: medicCooldown },
    },
    // Quick spatial queries
    queries: {
      nearestBase(entityId){
        const s = soldiers.find(s=>'S'+s.id===entityId);
        if(!s) return null;
        return Object.entries(BASES).map(([faction,b])=>({
          id: ENTITY_IDS['base_'+faction], faction,
          dist: Math.round(Math.hypot(s.x-b.fx*W(), s.y-b.fy*H()))
        })).sort((a,b)=>a.dist-b.dist)[0];
      },
      nearestMedic(entityId){
        const s = soldiers.find(s=>'S'+s.id===entityId);
        if(!s) return null;
        return medics.map((m,i)=>({
          id: ENTITY_IDS['medic_'+i], state: m.state,
          dist: Math.round(Math.hypot(s.x-m.x, s.y-m.y))
        })).sort((a,b)=>a.dist-b.dist)[0];
      },
      nearestEnemy(entityId){
        const s = soldiers.find(s=>'S'+s.id===entityId);
        if(!s) return null;
        const enemies = soldiers.filter(t=>t.faction!==s.faction);
        if(!enemies.length) return null;
        const e = enemies.reduce((best,t)=>
          Math.hypot(t.x-s.x,t.y-s.y)<Math.hypot(best.x-s.x,best.y-s.y)?t:best
        );
        return { id:'S'+e.id, faction:e.faction,
          dist:Math.round(Math.hypot(e.x-s.x,e.y-s.y)),
          gridLabel:gridLabel(toGrid(e.x,e.y).col,toGrid(e.x,e.y).row) };
      },
      nearestAlly(entityId){
        const s = soldiers.find(s=>'S'+s.id===entityId);
        if(!s) return null;
        const allies = soldiers.filter(t=>t.faction===s.faction && t!==s);
        if(!allies.length) return null;
        const a = allies.reduce((best,t)=>
          Math.hypot(t.x-s.x,t.y-s.y)<Math.hypot(best.x-s.x,best.y-s.y)?t:best
        );
        return { id:'S'+a.id, dist:Math.round(Math.hypot(a.x-s.x,a.y-s.y)),
          gridLabel:gridLabel(toGrid(a.x,a.y).col,toGrid(a.x,a.y).row) };
      },
      soldiersInCell(col, row){
        return soldiers
          .filter(s=>toGrid(s.x,s.y).col===col && toGrid(s.x,s.y).row===row)
          .map(s=>({id:'S'+s.id, faction:s.faction, hp:Math.round(s.hp)}));
      }
    }
  };
  return snap;
}

// ── AI Action API — call these to trigger game actions ──
const AIActions = {
  // Move controlled soldier toward a grid cell
  moveControlledTo(col, row){
    if(!controlled) return {ok:false, reason:'no controlled soldier'};
    const pos = fromGrid(col, row);
    controlled.tx = pos.x; controlled.ty = pos.y;
    // Temporarily set as advance target (AI can nudge via keys too)
    return {ok:true, target:{col,row,...pos}};
  },
  selectSoldier(entityId){
    const s = soldiers.find(s=>'S'+s.id===entityId && s.faction==='blue');
    if(!s) return {ok:false, reason:'not found or not blue'};
    selected = s; controlled = s;
    return {ok:true};
  },
  callAirstrike(){
    if(airCooldown>0) return {ok:false, reason:'on cooldown', ticks:airCooldown};
    document.getElementById('airBtn').click();
    return {ok:true};
  },
  callReinforcements(){
    if(reinforceCooldown>0) return {ok:false, reason:'on cooldown', ticks:reinforceCooldown};
    document.getElementById('reinforceBtn').click();
    return {ok:true};
  },
  callMedic(entityId){
    const s = soldiers.find(s=>'S'+s.id===entityId && s.faction==='blue');
    if(!s) return {ok:false, reason:'soldier not found'};
    selected = s;
    if(medicCooldown>0) return {ok:false, reason:'on cooldown', ticks:medicCooldown};
    document.getElementById('medicBtn').click();
    return {ok:true};
  },
};

function airstrikeChance(){
  // No planes at all early on, ramp up gradually
  if(tick < 500) return 0;
  const t = tick - 500;
  return Math.min(0.005, t * 0.0000009);
}

function showAlert(faction, ptype){
  const el=document.getElementById('air-alert');
  const label=ptype==='bomber'?'BOMBER RUN':'AIR STRIKE';
  el.textContent=`⚠ ${faction.toUpperCase()} ${label} INCOMING`;
  el.style.background=faction==='blue'?'rgba(0,70,200,0.9)':'rgba(200,30,0,0.9)';
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',2500);
}

function spawnPlane(faction, ptype){
  const enemies=soldiers.filter(s=>s.faction!==faction);
  if(enemies.length===0) return;
  const target=enemies[Math.floor(Math.random()*enemies.length)];
  const tx=target.x+(Math.random()-0.5)*60;
  const ty=target.y+(Math.random()-0.5)*60;

  const side=Math.floor(Math.random()*4);
  let sx,sy;
  if(side===0){sx=Math.random()*W();sy=-70;}
  else if(side===1){sx=W()+70;sy=Math.random()*H();}
  else if(side===2){sx=Math.random()*W();sy=H()+70;}
  else{sx=-70;sy=Math.random()*H();}

  const pt=PLANE_TYPES[ptype];
  const angle=Math.atan2(ty-sy,tx-sx);
  const spd=pt.spd+Math.random()*1.2;

  planes.push({
    faction, ptype, x:sx, y:sy,
    vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
    angle, tx, ty,
    dropped:false, bombsLeft:pt.bombCount, bombTimer:0,
    life:600, sz:pt.sz, trail:[],
  });
  totalSorties++;
  showAlert(faction, ptype);
}

function spawnBomb(plane, targetX, targetY, blastRadius){
  const dx=targetX-plane.x, dy=targetY-plane.y;
  const dist=Math.hypot(dx,dy)||1;
  const speed=7;
  bombs.push({
    x:plane.x, y:plane.y,
    vx:(dx/dist)*speed*0.9,
    vy:(dy/dist)*speed*0.5 - 1.5,
    tx:targetX, ty:targetY,
    faction:plane.faction,
    gravity:0.25, life:120, maxLife:120,
    trail:[], sz:10,
    blastRadius,
  });
}

function detonateBomb(b){
  const R=b.blastRadius;
  for(const s of soldiers){
    if(s.faction===b.faction) continue;
    const d=Math.hypot(s.x-b.x,s.y-b.y);
    if(d<R) s.hp -= (1-d/R)*110 + Math.random()*20;
  }

  // Shockwave ring — scale with radius
  fxArr.push({x:b.x,y:b.y,r:8,mr:R*1.1,life:30,ml:30,type:'shockwave'});

  // Core fireball — scale with radius
  const fb=R/130; // scale factor relative to base radius
  fxArr.push({x:b.x,y:b.y,r:5,mr:55*fb,life:45,ml:45,type:'blast'});
  fxArr.push({x:b.x,y:b.y,r:5,mr:35*fb,life:35,ml:35,type:'blast2'});

  // Secondary fireballs — more for bigger bombs
  const secCount=Math.round(5*fb);
  for(let i=0;i<secCount;i++){
    const a=Math.random()*Math.PI*2, rd=Math.random()*40*fb;
    fxArr.push({x:b.x+Math.cos(a)*rd,y:b.y+Math.sin(a)*rd,r:3,mr:(18+Math.random()*15)*fb,life:30+Math.floor(Math.random()*20),ml:50,type:'blast'});
  }

  // Sparks/debris — more for bigger bombs
  const sparkCount=Math.round(35*Math.sqrt(fb));
  for(let i=0;i<sparkCount;i++){
    const a=Math.random()*Math.PI*2, spd=3+Math.random()*9*fb;
    fxArr.push({x:b.x,y:b.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:2+Math.random()*3,life:40+Math.floor(Math.random()*30),ml:70,type:'spark',col:Math.random()<0.5?'#ffcc44':'#ff6600'});
  }

  // Smoke — more and larger for bigger bombs
  const smokeCount=Math.round(12*fb);
  for(let i=0;i<smokeCount;i++){
    const a=Math.random()*Math.PI*2, rd=Math.random()*35*fb;
    fxArr.push({x:b.x+Math.cos(a)*rd,y:b.y+Math.sin(a)*rd,vx:(Math.random()-0.5)*0.5,vy:-0.6-Math.random()*0.8,r:(10+Math.random()*15)*fb,life:90+Math.floor(Math.random()*60),ml:150,type:'smoke'});
  }

  craters.push({x:b.x,y:b.y,r:R*0.42});
}

// ── SOLDIERS ──────────────────────────────────────────────────────────────
function spawnPos(faction,fi){
  const f=FRONTS[fi],bmin=f.band[0],bmax=f.band[1];
  let x,y,angle;
  if(!f.vertical){y=bmin*H()+Math.random()*(bmax-bmin)*H();x=faction==='blue'?-20:W()+20;angle=faction==='blue'?0:Math.PI;}
  else{x=bmin*W()+Math.random()*(bmax-bmin)*W();y=faction==='blue'?-20:H()+20;angle=faction==='blue'?Math.PI/2:-Math.PI/2;}
  return{x,y,angle};
}
function mkTarget(faction,fi,fromX,fromY){
  const f=FRONTS[fi],bmin=f.band[0],bmax=f.band[1];
  if(!f.vertical){
    const tx=faction==='blue'?Math.min(W()-20,fromX+W()*(0.12+Math.random()*0.22)):Math.max(20,fromX-W()*(0.12+Math.random()*0.22));
    return{tx,ty:Math.max(bmin*H()+15,Math.min(bmax*H()-15,fromY+(Math.random()-0.5)*70))};
  }else{
    const ty=faction==='blue'?Math.min(H()-20,fromY+H()*(0.12+Math.random()*0.22)):Math.max(20,fromY-H()*(0.12+Math.random()*0.22));
    return{tx:Math.max(bmin*W()+15,Math.min(bmax*W()-15,fromX+(Math.random()-0.5)*70)),ty};
  }
}
function mkSoldier(faction,fi){
  const sp=spawnPos(faction,fi),tgt=mkTarget(faction,fi,sp.x,sp.y);
  return{id:nid++,faction,fi,x:sp.x,y:sp.y,tx:tgt.tx,ty:tgt.ty,vx:0,vy:0,hp:100,mhp:100,spd:1.22+Math.random()*0.82,fr:65+Math.floor(Math.random()*55),fc:Math.floor(Math.random()*65),state:'advance',retreating:false,angle:sp.angle,sz:20+Math.random()*5};
}

const tintCache={};
function getTinted(img, faction, key, tintStr){
  if(tintCache[key]) return tintCache[key];
  if(!img.complete||!img.naturalWidth) return null;
  const tc=document.createElement('canvas');
  tc.width=img.naturalWidth;tc.height=img.naturalHeight;
  const tx2=tc.getContext('2d');tx2.drawImage(img,0,0);
  const[tr,tg,tb]=tintStr==='blue'?[20,90,255]:[255,40,20];
  const imgd=tx2.getImageData(0,0,tc.width,tc.height);const d=imgd.data;
  for(let i=0;i<d.length;i+=4){if(d[i+3]>10){d[i]=Math.min(255,d[i]*0.25+tr*0.75)|0;d[i+1]=Math.min(255,d[i+1]*0.25+tg*0.75)|0;d[i+2]=Math.min(255,d[i+2]*0.25+tb*0.75)|0;}}
  tx2.putImageData(imgd,0,0);tintCache[key]=tc;return tc;
}

function wave(){
  const maxS = Math.min(55, 8 + Math.floor(tick/30));
  FRONTS.forEach((_,fi)=>{
    const bc = soldiers.filter(s=>s.faction==='blue').length;
    const rc = soldiers.filter(s=>s.faction==='red').length;
    const nb = Math.min(2+Math.floor(Math.random()*3), maxS - bc);
    const nr = Math.min(2+Math.floor(Math.random()*3), maxS - rc);
    for(let i=0;i<nb;i++) soldiers.push(mkSoldier('blue',fi));
    for(let i=0;i<nr;i++) soldiers.push(mkSoldier('red',fi));
  });
}
function nearestEnemy(s){
  let ne=null,md=Infinity;
  for(const t of soldiers){if(t.faction===s.faction)continue;const d=Math.hypot(t.x-s.x,t.y-s.y);if(d<md){md=d;ne=t;}}
  return{e:ne,d:md};
}
function shoot(from,to){
  const a=Math.atan2(to.y-from.y,to.x-from.x)+(Math.random()-0.5)*0.14;
  bullets.push({x:from.x,y:from.y,vx:Math.cos(a)*6.4,vy:Math.sin(a)*6.4,faction:from.faction,life:75,trail:[]});
}
function boom(x,y){
  for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,spd=1+Math.random()*2;fxArr.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:2.5,life:18,ml:18,type:'spark',col:'#ffaa44'});}
  fxArr.push({x,y,r:1,mr:12,life:13,ml:13,type:'blast'});
}
function respawn(s){
  const sp=spawnPos(s.faction,s.fi),tgt=mkTarget(s.faction,s.fi,sp.x,sp.y);
  s.hp=s.mhp;s.retreating=false;s.state='advance';s.x=sp.x;s.y=sp.y;s.tx=tgt.tx;s.ty=tgt.ty;s.angle=sp.angle;s.vx=0;s.vy=0;
}
function updateSoldier(s){
  // Heal if inside own base
  {
    const b=BASES[s.faction];
    const bx=b.fx*W(), by=b.fy*H();
    if(Math.hypot(s.x-bx,s.y-by)<BASE_RADIUS && s.hp<s.mhp){
      s.hp=Math.min(s.mhp, s.hp+HEAL_RATE);
    }
  }

  // Arrow key control overrides AI movement (but not shooting)
  if(s===controlled){
    const CSPD=s.spd*1.1;
    let cvx=0,cvy=0;
    if(keys['ArrowLeft']||keys['a'])  cvx=-CSPD;
    if(keys['ArrowRight']||keys['d']) cvx= CSPD;
    if(keys['ArrowUp']||keys['w'])    cvy=-CSPD;
    if(keys['ArrowDown']||keys['s'])  cvy= CSPD;
    if(cvx!==0||cvy!==0){
      s.vx=cvx; s.vy=cvy;
      s.angle=Math.atan2(cvy,cvx);
      s.x+=s.vx; s.y+=s.vy;
      s.x=Math.max(0,Math.min(W(),s.x));
      s.y=Math.max(0,Math.min(H(),s.y));
      s.retreating=false; s.state='controlled';
    }
    // Still shoot at nearest enemy even when controlled
    const{e,d}=nearestEnemy(s);
    if(e&&d<150){ s.angle=Math.atan2(e.y-s.y,e.x-s.x); s.fc--; if(s.fc<=0){shoot(s,e);s.fc=s.fr;} }
    // Still take damage (handled externally), just skip rest of AI
    return;
  }
  const{e,d}=nearestEnemy(s);
  if(s.hp<=22&&!s.retreating){s.retreating=true;s.state='retreat';const f=FRONTS[s.fi];if(!f.vertical){s.tx=s.faction==='blue'?-100:W()+100;s.ty=s.y;}else{s.tx=s.x;s.ty=s.faction==='blue'?-100:H()+100;}}
  if(s.retreating){const dx=s.tx-s.x,dy=s.ty-s.y,dd=Math.hypot(dx,dy)||1;s.vx=(dx/dd)*s.spd*1.5;s.vy=(dy/dd)*s.spd*1.5;s.angle=Math.atan2(dy,dx);}
  else if(e&&d<130){
    s.state='engage';const dx=e.x-s.x,dy=e.y-s.y,dd=Math.hypot(dx,dy)||1;s.angle=Math.atan2(dy,dx);
    if(d>75){s.vx=(dx/dd)*s.spd*0.75;s.vy=(dy/dd)*s.spd*0.75;}
    else{const fr=soldiers.filter(t=>t.faction===s.faction&&t!==s&&Math.hypot(t.x-s.x,t.y-s.y)<75);if(fr.length>=2){const p=s.angle+Math.PI*0.42*(s.id%2===0?1:-1);s.vx=Math.cos(p)*s.spd*0.45;s.vy=Math.sin(p)*s.spd*0.45;}else{s.vx*=0.6;s.vy*=0.6;}}
    if(d<105){s.fc--;if(s.fc<=0){shoot(s,e);s.fc=s.fr;}}
  }else{
    s.state='advance';const dx=s.tx-s.x,dy=s.ty-s.y,dd=Math.hypot(dx,dy)||1;
    if(dd>8){s.vx=(dx/dd)*s.spd;s.vy=(dy/dd)*s.spd;s.angle=Math.atan2(dy,dx);}
    else{const tgt=mkTarget(s.faction,s.fi,s.x,s.y);s.tx=tgt.tx;s.ty=tgt.ty;}
  }
  s.x+=s.vx;s.y+=s.vy;
  const f=FRONTS[s.fi];
  if(!f.vertical){const ymin=f.band[0]*H()+12,ymax=f.band[1]*H()-12;if(s.y<ymin){s.y=ymin;s.vy=Math.abs(s.vy)*0.4;}if(s.y>ymax){s.y=ymax;s.vy=-Math.abs(s.vy)*0.4;}}
  else{const xmin=f.band[0]*W()+12,xmax=f.band[1]*W()-12;if(s.x<xmin){s.x=xmin;s.vx=Math.abs(s.vx)*0.4;}if(s.x>xmax){s.x=xmax;s.vx=-Math.abs(s.vx)*0.4;}}
}
function idlePos(m){
  // Parking spots just inside blue base area, staggered
  return { x: BASES.blue.fx*W()+28+m.idx*36, y: BASES.blue.fy*H()+BASE_RADIUS*0.6+m.idx*20 };
}

function updateMedics(){
  medics.forEach(m=>{
    // Update trail
    m.trail.push({x:m.x,y:m.y});
    if(m.trail.length>16) m.trail.shift();

    const spd=5;
    if(m.state==='idle'){
      // Drift to idle parking spot
      const ip=idlePos(m);
      const dx=ip.x-m.x, dy=ip.y-m.y, d=Math.hypot(dx,dy)||1;
      if(d>3){ m.x+=(dx/d)*Math.min(spd,d); m.y+=(dy/d)*Math.min(spd,d); m.angle=Math.atan2(dy,dx); }
    }
    else if(m.state==='driving'){
      if(!m.target||!soldiers.includes(m.target)){ m.state='returning'; return; }
      const dx=m.target.x-m.x, dy=m.target.y-m.y, d=Math.hypot(dx,dy)||1;
      m.angle=Math.atan2(dy,dx);
      if(d>16){ m.x+=(dx/d)*spd; m.y+=(dy/d)*spd; }
      else { m.state='healing'; m.healing=true; }
    }
    else if(m.state==='healing'){
      if(!m.target||!soldiers.includes(m.target)){ m.state='returning'; m.healing=false; return; }
      // Face target
      m.angle=Math.atan2(m.target.y-m.y, m.target.x-m.x);
      m.target.hp=Math.min(m.target.mhp, m.target.hp+2.2);
      if(m.target.hp>=m.target.mhp){
        m.healing=false; m.target=null; m.state='returning';
      }
    }
    else if(m.state==='returning'){
      m.healing=false; m.target=null;
      const ip=idlePos(m);
      const dx=ip.x-m.x, dy=ip.y-m.y, d=Math.hypot(dx,dy)||1;
      m.angle=Math.atan2(dy,dx);
      if(d>4){ m.x+=(dx/d)*spd; m.y+=(dy/d)*spd; }
      else { m.state='idle'; }
    }
  });
}

function drawOneMedic(m){
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(m.angle + Math.PI/2);

  const W2=11, H2=18;

  // Trail
  ctx.restore();
  if(m.trail.length>1){
    ctx.beginPath(); ctx.moveTo(m.trail[0].x,m.trail[0].y);
    m.trail.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='rgba(255,80,80,0.2)'; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.angle+Math.PI/2);

  // Hull
  ctx.fillStyle='#5a6e2a';
  ctx.beginPath();
  ctx.moveTo(-W2+2,-H2); ctx.lineTo(W2-2,-H2); ctx.lineTo(W2,-H2+4);
  ctx.lineTo(W2,H2-4); ctx.lineTo(W2-2,H2); ctx.lineTo(-W2+2,H2);
  ctx.lineTo(-W2,H2-4); ctx.lineTo(-W2,-H2+4); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#3d4d1a'; ctx.lineWidth=0.8; ctx.strokeRect(-W2+1,-H2+1,(W2-1)*2,(H2-1)*2);

  // Tracks
  ctx.fillStyle='#2a2a2a';
  ctx.fillRect(-W2-4,-H2,5,H2*2); ctx.fillRect(W2-1,-H2,5,H2*2);
  ctx.fillStyle='#444';
  for(let i=0;i<7;i++){ ctx.fillRect(-W2-4,-H2+i*5+1,5,2); ctx.fillRect(W2-1,-H2+i*5+1,5,2); }

  // Turret
  ctx.fillStyle='#6a7e32';
  ctx.beginPath(); ctx.arc(0,2,7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3d4d1a'; ctx.lineWidth=0.8; ctx.stroke();

  // Barrel
  ctx.fillStyle='#3a3a3a'; ctx.fillRect(-1.5,-H2-6,3,14);
  ctx.fillStyle='#222'; ctx.fillRect(-2,-H2-8,4,4);

  // Red cross
  ctx.fillStyle='#ff0000'; ctx.globalAlpha=0.92;
  ctx.fillRect(-6,0,12,4); ctx.fillRect(-2,-4,4,12);
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=0.5;
  ctx.strokeRect(-6,0,12,4); ctx.strokeRect(-2,-4,4,12);

  // Flashing beacon
  const flash=Math.sin(tick*0.25)>0;
  ctx.fillStyle=flash?'#ff2222':'#ff8888';
  ctx.beginPath(); ctx.arc(4,-8,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=flash?'#ffffff':'#ffcccc'; ctx.globalAlpha=0.6;
  ctx.beginPath(); ctx.arc(4,-8,4.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Idle indicator — small 'READY' badge
  if(m.state==='idle'){
    ctx.restore();
    ctx.save();
    ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(m.x-14,m.y+H2+2,28,11);
    ctx.fillStyle='#44ff88';
    ctx.fillText('READY',m.x,m.y+H2+11);
    ctx.textAlign='left';
  }

  ctx.restore();

  // Healing FX
  if(m.healing && m.target && soldiers.includes(m.target)){
    const t=m.target, prog=t.hp/t.mhp;
    const pulse=Math.sin(tick*0.2)*0.3+0.7;
    ctx.save();
    ctx.globalAlpha=pulse*0.7;
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.sz/2+12,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#44ff88'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.sz/2+12,-Math.PI/2,-Math.PI/2+Math.PI*2*prog); ctx.stroke();
    ctx.globalAlpha=1;
    if(tick%8<4){
      ctx.font='bold 13px monospace'; ctx.textAlign='center';
      ctx.fillStyle='#44ff88';
      ctx.fillText('+',t.x+Math.sin(tick*0.3)*14,t.y-t.sz-4-(tick%30)*0.5);
      ctx.textAlign='left';
    }
    ctx.restore();
  }
}

function drawMedics(){
  medics.forEach(drawOneMedic);
}

function updateBullets(){
  bullets=bullets.filter(b=>{
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>5)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<-10||b.x>W()+10||b.y<-10||b.y>H()+10)return false;
    for(const s of soldiers){if(s.faction===b.faction)continue;if(Math.hypot(s.x-b.x,s.y-b.y)<10){s.hp-=8+Math.random()*12;boom(b.x,b.y);return false;}}
    return true;
  });
}
function updatePlanes(){
  if(Math.random()<airstrikeChance()){
    const faction=Math.random()<0.5?'blue':'red';
    // Bombers spawn ~30% of the time, fighters 70%
    const ptype=Math.random()<0.3?'bomber':'fighter';
    spawnPlane(faction,ptype);
  }
  planes=planes.filter(p=>{
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>14)p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;p.life--;

    const pt=PLANE_TYPES[p.ptype];

    if(!p.dropped){
      const dist=Math.hypot(p.x-p.tx,p.y-p.ty);
      if(dist<55){
        // Drop first bomb
        spawnBomb(p,p.tx,p.ty,pt.blastRadius);
        p.dropped=true;
        p.bombsLeft=pt.bombCount-1;
        p.bombTimer=pt.bombInterval;
        // Bank away after drop
        const bank=p.angle+Math.PI*0.28*(Math.random()<0.5?1:-1);
        p.vx=Math.cos(bank)*pt.spd;p.vy=Math.sin(bank)*pt.spd;
      }
    } else if(p.bombsLeft>0){
      // Bomber drops additional bombs in sequence along its path
      p.bombTimer--;
      if(p.bombTimer<=0){
        // Target slightly ahead of last impact point
        const bx=p.tx+p.vx*40+(Math.random()-0.5)*50;
        const by=p.ty+p.vy*40+(Math.random()-0.5)*50;
        spawnBomb(p,bx,by,pt.blastRadius);
        p.bombsLeft--;
        p.bombTimer=pt.bombInterval;
        p.tx=bx;p.ty=by;
      }
    }

    if(p.life<=0||p.x<-150||p.x>W()+150||p.y<-150||p.y>H()+150)return false;
    return true;
  });

  bombs=bombs.filter(b=>{
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>20)b.trail.shift();
    b.vy+=b.gravity;b.x+=b.vx;b.y+=b.vy;b.life--;
    if(Math.hypot(b.x-b.tx,b.y-b.ty)<18||b.life<=0){detonateBomb(b);return false;}
    return true;
  });
}

function drawBases(){

    // Internal roads (cross pattern)
    ctx.strokeStyle='rgba(200,180,120,0.5)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(bx-R,by); ctx.lineTo(bx+R,by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx,by-R); ctx.lineTo(bx,by+R); ctx.stroke();

    // HQ building — large center
    ctx.fillStyle='#ddd';
    ctx.fillRect(bx-20, by-14, 40, 28);
    ctx.fillStyle=b.dark;
    ctx.globalAlpha=0.85;
    ctx.fillRect(bx-20, by-14, 40, 28);

    // Barracks — 3 rectangles on one side
    for(let i=0;i<3;i++){
      ctx.fillStyle='#ccc';

      ctx.globalAlpha=1;
      ctx.strokeStyle='#888'; ctx.lineWidth=0.5;
      ctx.strokeRect(bx-R+8, by-R+12+i*18, 26, 12);
    }

    // Supply depot opposite side
    ctx.fillStyle='#bbb';
    ctx.fillRect(bx+R-38, by-R+10, 30, 22);
    ctx.fillStyle=b.col; ctx.globalAlpha=0.25;
    ctx.fillRect(bx+R-38, by-R+10, 30, 22);
    ctx.globalAlpha=1;
    ctx.strokeStyle='#777'; ctx.lineWidth=0.5;
    ctx.strokeRect(bx+R-38, by-R+10, 30, 22);

    // Vehicles (bottom row)
    for(let i=0;i<4;i++){
      ctx.fillStyle=b.col; ctx.globalAlpha=0.85;
      ctx.fillRect(bx-R+8+i*22, by+R-22, 16, 10);
      ctx.globalAlpha=1;
    }

    // Flag pole + flag
    const fpx=bx+R-12, fpy=by-R+6;
    ctx.strokeStyle='#ccc'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(fpx,fpy); ctx.lineTo(fpx,fpy+24); ctx.stroke();
    ctx.fillStyle=b.col; ctx.globalAlpha=0.95;
    ctx.fillRect(fpx, fpy, 16, 10);
    ctx.globalAlpha=1;
    // Flag X detail
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(fpx,fpy); ctx.lineTo(fpx+16,fpy+10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fpx+16,fpy); ctx.lineTo(fpx,fpy+10); ctx.stroke();

    // Pulsing heal aura
    const pulse=Math.sin(tick*0.08)*0.25+0.45;
    ctx.strokeStyle=b.col; ctx.lineWidth=2.5;
    ctx.globalAlpha=pulse;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.arc(bx,by,R+10,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;

    // Label — big and clear
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillText(b.label, bx+1, by-R-10+1);
    ctx.fillStyle=b.col;
    ctx.fillText(b.label, bx, by-R-10);

    ctx.font='10px monospace';
    ctx.fillStyle='rgba(0,0,0,0.6)';

    ctx.fillStyle='rgba(255,255,255,0.85)';

function drawPlanes(){
  for(const p of planes){
    const pt=PLANE_TYPES[p.ptype];

    if(p.trail.length>2){
      for(let i=1;i<p.trail.length;i++){
        const a=(i/p.trail.length)*0.45;
        ctx.beginPath();ctx.moveTo(p.trail[i-1].x,p.trail[i-1].y);ctx.lineTo(p.trail[i].x,p.trail[i].y);
        ctx.strokeStyle=p.faction==='blue'?`rgba(160,210,255,${a})`:`rgba(255,160,100,${a})`;

      ctx.rotate(p.angle+pt.angleOffset);

    }

function drawFx(){
  fxArr=fxArr.filter(e=>{
    e.life--;const a=e.life/e.ml;
    if(e.type==='shockwave'){
      e.r+=(e.mr-e.r)*0.28;ctx.globalAlpha=a*0.5;
      ctx.strokeStyle='rgba(255,220,100,0.9)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.stroke();

      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }else if(e.type==='blast'){
      e.r+=(e.mr-e.r)*0.3;ctx.globalAlpha=a*0.9;
      const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
      g.addColorStop(0,'rgba(255,255,200,1)');g.addColorStop(0.3,'rgba(255,180,50,0.9)');g.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }else if(e.type==='blast2'){
      e.r+=(e.mr-e.r)*0.35;ctx.globalAlpha=a*0.7;ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }else if(e.type==='smoke'){
      e.x+=e.vx;e.y+=e.vy;e.r+=0.5;ctx.globalAlpha=a*0.28;ctx.fillStyle='rgba(100,90,80,1)';
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }else{
      e.x+=e.vx;e.y+=e.vy;e.vy+=0.1;ctx.globalAlpha=a;ctx.fillStyle=e.col||'#ffaa44';
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;return e.life>0;
  });
}
function drawSoldiers(){

    else{ctx.fillStyle=s.faction==='blue'?'#4a9eff':'#ff4a4a';ctx.beginPath();ctx.arc(0,0,h,0,Math.PI*2);ctx.fill();}

    const bw=s.sz+4,bx=s.x-bw/2,by=s.y-s.sz-6;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(bx,by,bw,3);
    ctx.fillStyle=s.hp>60?'#44ee44':s.hp>22?'#ffcc00':'#ff3333';
    ctx.fillRect(bx,by,bw*(s.hp/s.mhp),3);
    if(s===selected){
      // Outer glow ring
      ctx.save();
      ctx.shadowColor='#ffffff'; ctx.shadowBlur=18;
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.sz/2+12,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      // Spinning dashed indicator
      ctx.save();
      ctx.translate(s.x,s.y);
      ctx.rotate(tick*0.05);
      ctx.strokeStyle='#ffff00'; ctx.lineWidth=2.5; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.arc(0,0,s.sz/2+18,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // 4 corner brackets
      ctx.save();
      const bsz=s.sz/2+26;
      const bl=10;
      ctx.strokeStyle='#ffff00'; ctx.lineWidth=2.5;
      [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([dx,dy])=>{
        const cx=s.x+dx*bsz, cy=s.y+dy*bsz;
        ctx.beginPath(); ctx.moveTo(cx,cy-dy*bl); ctx.lineTo(cx,cy); ctx.lineTo(cx-dx*bl,cy); ctx.stroke();
      });
      ctx.restore();
      // Controlled label above
      if(s===controlled){
        ctx.save();
        ctx.font='bold 11px monospace';
        ctx.textAlign='center';
        ctx.fillStyle='rgba(0,0,0,0.7)';
        ctx.fillRect(s.x-32,s.y-s.sz/2-34,64,16);
        ctx.strokeStyle='#ffff00'; ctx.lineWidth=1;
        ctx.strokeRect(s.x-32,s.y-s.sz/2-34,64,16);
        ctx.fillStyle='#ffff00';
        ctx.fillText('▶ YOU',s.x,s.y-s.sz/2-22);
        ctx.textAlign='left';
        ctx.restore();
      }
    }
  }
}
function draw(){
  ctx.clearRect(0,0,W(),H());
  drawGrid();
  drawTerrain();drawCraters();drawBases();drawFronts();drawBases_crosshairs();
  drawFx();drawBombs();drawBullets();drawPlanes();drawMedics();drawSoldiers();
}
function update(){
  if(paused)return;tick++;
  // Wave frequency and size scale with time
  const maxSoldiers = Math.min(55, 8 + Math.floor(tick/30));
  const waveInterval = Math.max(40, 200 - Math.floor(tick/30)*8);
  if(tick % waveInterval === 0) {
    const waveSize = Math.min(3, 1 + Math.floor(tick/200));
    FRONTS.forEach((_,fi)=>{
      const blueCount = soldiers.filter(s=>s.faction==='blue').length;
      const redCount  = soldiers.filter(s=>s.faction==='red').length;
      const reinforceMulti = reinforcementTicks>0 ? 2 : 1;
      const nb = Math.min((1+Math.floor(Math.random()*waveSize))*reinforceMulti, maxSoldiers - blueCount);
      const nr = Math.min(1+Math.floor(Math.random()*waveSize), maxSoldiers - redCount);
      for(let i=0;i<nb;i++){
        const s=mkSoldier('blue',fi);
        if(reinforcementTicks>0){
          // Reinforcements push deeper into enemy territory
          s.tx=W()*(0.55+Math.random()*0.4);
        }
        soldiers.push(s);
      }
      for(let i=0;i<nr;i++) soldiers.push(mkSoldier('red',fi));
    });
  }
  soldiers.forEach(updateSoldier);updateBullets();updatePlanes();updateMedics();
  // Cap enforced at spawn, not by silent removal — nothing here
  soldiers=soldiers.filter(s=>{
    if(s.hp<=0){boom(s.x,s.y);boom(s.x+4,s.y-3);if(s===controlled){controlled=null;selected=null;
      const cBtn=document.getElementById('colonelBtn');
      if(cBtn){cBtn.disabled=true;cBtn.style.opacity='0.4';cBtn.style.cursor='not-allowed';}
    }return false;}
    if(s.retreating){const f=FRONTS[s.fi];const off=!f.vertical?(s.x<-90||s.x>W()+90):(s.y<-90||s.y>H()+90);if(off)respawn(s);}
    return true;
  });
  const bl=soldiers.filter(s=>s.faction==='blue').length;
  const rl=soldiers.filter(s=>s.faction==='red').length;
  document.getElementById('bc').textContent='🔵 Blue: '+bl;
  document.getElementById('rc').textContent='🔴 Red: '+rl;
  document.getElementById('tc').textContent='T:'+tick;
  document.getElementById('ac').textContent='✈ Sorties: '+totalSorties;

  // Tick down reinforcement
  if(reinforcementTicks>0) reinforcementTicks--;

  // Medic trails handled inside updateMedics()

  // Medic cooldown
  if(medicCooldown>0){
    medicCooldown--;
    const secs=Math.ceil(medicCooldown/60);
    medicBtn.textContent=medicCooldown>0?`🚑 Medic (${secs}s)`:'🚑 Medic';
    if(medicCooldown===0){medicBtn.disabled=false;medicBtn.textContent='🚑 Medic';}
  }

  // Airstrike cooldown + button label
  if(airCooldown>0){
    airCooldown--;
    const secs=Math.ceil(airCooldown/60);
    airBtn.textContent=airCooldown>0?`✈ Airstrike (${secs}s)`:'✈ Airstrike';
    if(airCooldown===0) airBtn.disabled=false;
  }

  // Reinforce cooldown + button label
  if(reinforceCooldown>0){
    reinforceCooldown--;
    const secs=Math.ceil(reinforceCooldown/60);
    if(reinforcementTicks>0){
      const pct=Math.ceil((reinforcementTicks/REINFORCE_DURATION)*100);
      reinforceBtn.textContent=`⚔ Reinforcing... ${pct}%`;
      reinforceBtn.style.background='rgba(0,100,30,0.9)';
    } else {
      reinforceBtn.textContent=reinforceCooldown>0?`⚔ Reinforce (${secs}s)`:'⚔ Reinforce';
      reinforceBtn.style.background='rgba(0,60,20,0.8)';
    }
    if(reinforceCooldown===0){ reinforceBtn.disabled=false; reinforceBtn.textContent='⚔ Reinforce'; }
  }
  if(selected){
    const sel=document.getElementById('sel');
    if(!soldiers.includes(selected)){sel.style.display='none';selected=null;}
    else{
      const col=selected.faction==='blue'?'#4a9eff':'#ff6666';
      sel.style.display='block';
      const ctrlBadge=selected===controlled
        ?'<br><span style="color:#ffdd44;font-size:11px">🎮 ARROW KEYS / WASD</span>'
        :(selected.faction==='red'?'<br><span style="color:#ff8888;font-size:10px">enemy unit</span>':'');
      sel.innerHTML=`<b style="color:${col}">${selected.faction.toUpperCase()} #${selected.id}</b><br>${FRONTS[selected.fi].name}<br>${selected.state}${ctrlBadge}<br>HP: ${Math.max(0,Math.round(selected.hp))}/${selected.mhp}`;
    }
  }
}
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);
  let best=null,bd=Infinity;
  for(const s of soldiers){const d=Math.hypot(s.x-mx,s.y-my);if(d<28&&d<bd){bd=d;best=s;}}
  // Only blue soldiers are selectable/controllable
  selected=(best&&best.faction==='blue')?best:null;
  controlled=selected;
  // Enable Colonel AI button only when a soldier is selected
  const cBtn=document.getElementById('colonelBtn');
  if(selected){ cBtn.disabled=false; cBtn.style.opacity='1'; cBtn.style.cursor='pointer'; }
  else { cBtn.disabled=true; cBtn.style.opacity='0.4'; cBtn.style.cursor='not-allowed'; }
  document.getElementById('sel').style.display=best?'block':'none';
});
document.getElementById('pb').addEventListener('click',()=>{paused=!paused;document.getElementById('pb').textContent=paused?'▶ Resume':'⏸ Pause';});

// Airstrike button — player (blue) calls in 3 fighters on red soldiers
const airBtn=document.getElementById('airBtn');
const AIRSTRIKE_COOLDOWN=600;
let airCooldown=0;
airBtn.addEventListener('click',()=>{
  if(airCooldown>0) return;
  // Send 3 fighters targeting red soldiers
  for(let i=0;i<3;i++){
    setTimeout(()=>{ spawnPlane('blue','fighter'); }, i*400);
  }
  airCooldown=AIRSTRIKE_COOLDOWN;
  airBtn.disabled=true;
});

// Reinforce button — doubles blue spawns for a duration
const reinforceBtn=document.getElementById('reinforceBtn');
const REINFORCE_COOLDOWN=900;
let reinforceCooldown=0;
reinforceBtn.addEventListener('click',()=>{
  if(reinforceCooldown>0) return;
  reinforcementTicks=REINFORCE_DURATION;
  reinforceCooldown=REINFORCE_COOLDOWN;
  reinforceBtn.disabled=true;
  // Immediately spawn a surge wave of blue soldiers pushing deep
  const maxS=Math.min(80,8+Math.floor(tick/30));
  FRONTS.forEach((_,fi)=>{
    const bc=soldiers.filter(s=>s.faction==='blue').length;
    const count=Math.min(4, maxS-bc);
    for(let i=0;i<count;i++){
      const s=mkSoldier('blue',fi);
      // Push target deep into enemy territory
      s.tx=s.faction==='blue'?W()*(0.6+Math.random()*0.35):W()*(0.05+Math.random()*0.35);
      soldiers.push(s);
    }
  });
});

// Medic car button
const medicBtn=document.getElementById('medicBtn');
medicBtn.addEventListener('click',()=>{
  if(medicCooldown>0) return;
  if(!selected || selected.faction!=='blue'){
    medicBtn.textContent='🚑 Select a soldier!';
    setTimeout(()=>medicBtn.textContent='🚑 Medic',1500);
    return;
  }
  if(selected.hp>=selected.mhp){
    medicBtn.textContent='🚑 Already full HP';
    setTimeout(()=>medicBtn.textContent='🚑 Medic',1500);
    return;
  }
  // Find an idle or returning medic; prefer idle
  let m=medics.find(m=>m.state==='idle') || medics.find(m=>m.state==='returning') || medics[0];
  m.target=selected;
  m.state='driving';
  m.healing=false;
  medicCooldown=MEDIC_COOLDOWN;
  medicBtn.disabled=true;
});

wave();
let lastTime=0;
const STEP=1000/60; // fixed 60Hz timestep
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(now-lastTime, 100); // cap at 100ms to avoid spiral of death
  lastTime=now;
  let steps=Math.round(dt/STEP);
  for(let i=0;i<steps;i++) update();
  draw();
}
function tryStart(){
  if(terrainImg.complete&&terrainImg.naturalWidth&&soldierImg.complete&&soldierImg.naturalWidth&&fighterImg.complete&&fighterImg.naturalWidth&&bomberImg.complete&&bomberImg.naturalWidth){
    medics=[makeMedic(0),makeMedic(1),makeMedic(2)];
    requestAnimationFrame(loop);
  }else setTimeout(tryStart,40);
}
tryStart();
window.addEventListener('resize',resize);

// ── Colonel AI Panel ──────────────────────────────────────────
const colonelBtn = document.getElementById('colonelBtn');
const colonelPanel = document.getElementById('colonel-panel');
const colonelClose = document.getElementById('colonel-close');
const colonelStateEl = document.getElementById('colonel-state-text');

function formatWorldState(){
  if(typeof medics==='undefined'||!medics.length) return 'World not ready yet.';
  const ws = window.WAR.getWorldState();
  const blueSoldiers = ws.soldiers.filter(s=>s.faction==='blue');
  const redSoldiers  = ws.soldiers.filter(s=>s.faction==='red');
  const controlled   = ws.soldiers.find(s=>s.isControlled);

  let out = '';
  out += `━━ TICK ${ws.tick} ━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  out += `🔵 Blue: ${blueSoldiers.length} soldiers  🔴 Red: ${redSoldiers.length} soldiers\n`;
  out += `✈  Planes in air: ${ws.planes.length}   💣 Bombs falling: ${ws.bombs.length}\n\n`;

  out += `━━ CONTROLLED SOLDIER ━━━━━━━━━━━━━━━━━━━━\n`;
  if(controlled){
    out += `  ID: ${controlled.id}  Grid: ${controlled.gridLabel}\n`;
    out += `  HP: ${controlled.hp}/${controlled.maxHp} (${controlled.hpPct}%)  State: ${controlled.state}\n`;
    const ne = ws.queries.nearestEnemy(controlled.id);
    const nb = ws.queries.nearestBase(controlled.id);
    const nm = ws.queries.nearestMedic(controlled.id);
    if(ne) out += `  Nearest enemy: ${ne.id} @ ${ne.gridLabel} (${ne.dist}px)\n`;
    if(nb) out += `  Nearest base:  ${nb.id} (${nb.dist}px)\n`;
    if(nm) out += `  Nearest medic: ${nm.id} state=${nm.state} (${nm.dist}px)\n`;
  } else {
    out += `  None selected. Click a blue soldier.\n`;
  }

  out += `\n━━ MEDICS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  ws.medics.forEach(m=>{
    out += `  ${m.id}  Grid:${m.gridLabel}  State:${m.state}`;
    if(m.targetId) out += `  → ${m.targetId}`;
    out += `\n`;
  });

  out += `\n━━ ACTIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  Object.entries(ws.actions).forEach(([k,v])=>{
    out += `  ${k.padEnd(12)} ${v.available?'✅ READY':'⏳ '+v.cooldownTicks+' ticks'}\n`;
  });

  out += `\n━━ BLUE SOLDIERS ━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  blueSoldiers.forEach(s=>{
    const flag = s.isControlled?'[YOU] ':s.isSelected?'[SEL] ':'      ';
    out += `  ${flag}${s.id.padEnd(6)} Grid:${s.gridLabel.padEnd(4)} HP:${String(s.hp).padStart(3)}/${s.maxHp}  ${s.state}\n`;
  });

  out += `\n━━ RED SOLDIERS ━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  redSoldiers.slice(0,12).forEach(s=>{
    out += `  ${s.id.padEnd(6)} Grid:${s.gridLabel.padEnd(4)} HP:${String(s.hp).padStart(3)}/${s.maxHp}\n`;
  });
  if(redSoldiers.length>12) out += `  ... and ${redSoldiers.length-12} more\n`;

  out += `\n━━ API ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  out += `  window.WAR.getWorldState()\n`;
  out += `  window.WAR.AIActions.callAirstrike()\n`;
  out += `  window.WAR.AIActions.callReinforcements()\n`;
  out += `  window.WAR.AIActions.callMedic('S##')\n`;
  out += `  window.WAR.AIActions.selectSoldier('S##')\n`;
  out += `  window.WAR.AIActions.moveControlledTo(col,row)\n`;

  return out;
}

colonelBtn.addEventListener('click',()=>{
  const isOpen = colonelPanel.style.display==='flex';
  colonelPanel.style.display = isOpen?'none':'flex';
  if(!isOpen) colonelStateEl.textContent = formatWorldState();
});
